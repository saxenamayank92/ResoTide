<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Royal Navy deep yachting background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Yacht Club Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Deep gold shadow glow -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="8" stdDeviation="12" flood-color="#d97706" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Deep Slate rounded canvas background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer circular Yachting compass lines -->
  <circle cx="256" cy="235" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.25" />
  
  <!-- Laurel branch leaves representing club prestige -->
  <path d="M 120 330 C 100 230, 100 130, 160 80" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="5 5" />
  <path d="M 392 330 C 412 230, 412 130, 352 80" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="5 5" />

  <!-- Center Yachting Anchor Emblem -->
  <g filter="url(#goldGlow)" transform="translate(256, 230) scale(1.65)">
    <!-- Anchor Ring -->
    <circle cx="0" cy="-60" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="6" />
    
    <!-- Anchor Shank (Vertical stem) -->
    <rect x="-4.5" y="-50" width="9" height="90" rx="3.5" fill="url(#goldGrad)" />
    
    <!-- Crossbeam (Stock) -->
    <rect x="-35" y="-38" width="70" height="9" rx="3" fill="url(#goldGrad)" />
    <circle cx="-35" cy="-33.5" r="5.5" fill="url(#goldGrad)" />
    <circle cx="35" cy="-33.5" r="5.5" fill="url(#goldGrad)" />

    <!-- Anchor Flukes (Crescent curves) -->
    <path d="M -55 5 C -55 45, 55 45, 55 5 C 40 40, -40 40, -55 5 Z" fill="url(#goldGrad)" />
    
    <!-- Anchor Crown (Base center point) -->
    <path d="M -10 38 L 10 38 L 0 52 Z" fill="url(#goldGrad)" />

    <!-- Left and right fluke arrow points -->
    <path d="M -57 5 L -45 10 L -50 0 Z" fill="url(#goldGrad)" />
    <path d="M 57 5 L 45 10 L 50 0 Z" fill="url(#goldGrad)" />
  </g>

  <!-- Typography labels in elegant serif and block formats -->
  <text x="256" y="432" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="6">DOCKSIDE</text>
  <text x="256" y="460" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">THE OAKVILLE CLUB • 1907</text>
</svg>
